<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Producto — Cyberduck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <div class="brand">
        <a class="brand__logo-group" href="./index.html">
          <img src="./imgs/logo.png" alt="Cyberduck logo" class="brand__img">
          <div class="brand__logo">CYBERDUCK</div>
        </a>
        <nav class="nav" aria-label="navegación principal">
          <a class="nav__link" href="./nuevo.html">¿qué hay de nuevo?</a>
          <div class="nav__item nav__item--dropdown">
            <a class="nav__link nav__link--parent" href="./ropa.html?cat=todos" aria-haspopup="true">ropa <span class="nav__chevron" aria-hidden="true"></span></a>
            <div class="nav__dropdown" role="menu">
              <a class="nav__dropdown-link" href="./ropa.html?cat=todos" role="menuitem">Todo</a>
              <a class="nav__dropdown-link" href="./ropa.html?cat=camisetas" role="menuitem">Camisetas</a>
              <a class="nav__dropdown-link" href="./ropa.html?cat=faldas" role="menuitem">Faldas</a>
            </div>
          </div>
          <a class="nav__link" href="./accesorios.html">accesorios</a>
          <div class="nav__item nav__item--dropdown">
            <a class="nav__link nav__link--parent" href="./impresion3d.html?cat=todos" aria-haspopup="true">impresión 3D <span class="nav__chevron" aria-hidden="true"></span></a>
            <div class="nav__dropdown" role="menu">
              <a class="nav__dropdown-link" href="./impresion3d.html?cat=llaveros" role="menuitem">Llaveros</a>
              <a class="nav__dropdown-link" href="./impresion3d.html?cat=figuras" role="menuitem">Figuras</a>
              <a class="nav__dropdown-link" href="./impresion3d.html?cat=coleccion" role="menuitem">Colección</a>
            </div>
          </div>
          <a class="nav__link" href="./media.html">media</a>
          <a class="nav__link" href="./nosotros.html">nosotros</a>
          <a class="nav__custom" href="./personalizar.html">✨ personaliza tu 3D ✨</a>
        </nav>
      </div>

      <div class="header__actions">
        <button class="iconbtn" type="button" aria-label="Idioma">ES</button>
        <button class="iconbtn" type="button" aria-label="Buscar">⌕</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="section product-detail">
        <div class="product-detail__grid">
          <div class="product-detail__visual">
            <div class="product-detail__image" id="pd-image" aria-hidden="true"></div>
          </div>

          <div class="product-detail__info">
            <button id="pd-back" class="btn" aria-label="Volver">Volver</button>
            <h1 id="pd-title" class="headline">Título del producto</h1>
            <div id="pd-price" class="product-detail__price">0,00 EUR</div>

            <div style="margin:18px 0;">
              <a class="btn btn--primary" id="pd-add">AÑADIR AL CARRITO →</a>
            </div>

            <div class="product-detail__excerpt" id="pd-excerpt">
              <p>Descripción breve del producto.</p>
            </div>
          </div>
        </div>

        <!-- Descripción completa eliminada según petición del usuario -->
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__grid">
      <div>
        <h3 class="footer__title">Cyberduck</h3>
        <p class="footer__tiny">Estética neón en negro, objetos alternativos y prints 3D.</p>
      </div>
    </div>
  </footer>

  <script src="./script.js"></script>
  <script src="./analytics.js"></script>

  <script>
    function readSelectedProduct() {
      try {
        const raw = localStorage.getItem('cyberduck:selectedProduct');
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        console.warn('No se pudo leer el producto seleccionado:', error);
        return null;
      }
    }

    function formatProductPrice(data) {
      if (!data || data.price === undefined || data.price === null || data.price === '') {
        return '—';
      }

      return typeof data.price === 'number' ? '$' + data.price.toLocaleString('es-CO') + ' COP' : data.price;
    }

    function updateProductText(data) {
      const titleEl = document.getElementById('pd-title');
      const priceEl = document.getElementById('pd-price');
      const excerptEl = document.getElementById('pd-excerpt');

      if (titleEl) titleEl.textContent = data && data.name ? data.name : 'Producto';
      if (priceEl) priceEl.textContent = formatProductPrice(data);
      if (excerptEl) excerptEl.innerHTML = data && data.desc ? data.desc : 'Descripción breve del producto.';

      return { titleEl, excerptEl };
    }

    function updateProductImage(data) {
      const imageEl = document.getElementById('pd-image');
      if (!imageEl) {
        return;
      }

      imageEl.innerHTML = '';
      imageEl.style.background = '';

      if (!data || !data.image) {
        imageEl.style.background = 'linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01))';
        return;
      }

      const title = data.name || 'Producto';
      const actualImg = document.createElement('img');
      const rawSource = data.image.replace(/^url\(['"]?/, '').replace(/['"]?\)$/, '');
      const optimizedSource = globalThis.cyberduck && globalThis.cyberduck.optimizeImageUrl
        ? globalThis.cyberduck.optimizeImageUrl(rawSource, { width: 960, quality: 74 })
        : rawSource;

      actualImg.src = optimizedSource;
      actualImg.style.width = '100%';
      actualImg.style.height = '100%';
      actualImg.style.objectFit = 'contain';
      actualImg.style.borderRadius = '16px';
      actualImg.alt = title;
      actualImg.decoding = 'async';
      imageEl.appendChild(actualImg);
    }

    function loadPersonalizationContent(data, excerptEl, titleEl) {
      if (!data || data.category !== 'personalizado') {
        return;
      }

      fetch('https://script.googleusercontent.com/macros/echo?user_content_key=AehSKLhWlgY5Fdl5wowNtL4vPepVvILg5ZlIkwyrmm8HyRWxQRJ2qLCi-v7gN3VZ8ErRIByWR8T9LLFLDejPriNlwB0WAcHX9Lpe4tkI1FSeJOAD--X04Qm_dmy9eO3VYjfG5s1GNfuEgm4v4XEooMJU9EFWM_3rq10vYMJvq8tJkpbzUbStrMtLGljkjuPxR1sYE_75OjCaXE90EHpy1ZLSHTQGfItYuwLnDEG3ZYB-7hgAzpA3qdGjHI0T0N7Ac3p0XV9fvqF5pBNPE-ctBy1PDrUEM4C5w&lib=M-YxSEsKo8g88BRj95yNKp5OjAoyKQGY4')
        .then(response => response.json())
        .then(scriptData => {
          const fetchedTitle = scriptData && scriptData.title ? scriptData.title : null;
          const fetchedDescription = scriptData && scriptData.description ? scriptData.description : null;

          if (fetchedTitle && titleEl) titleEl.textContent = fetchedTitle;
          if (fetchedDescription && excerptEl) excerptEl.innerHTML = fetchedDescription;
        })
        .catch(error => {
          console.warn('Failed to fetch personalization data:', error);
          if (excerptEl) {
            excerptEl.innerHTML = '<strong>¿Cómo cotizar tu idea?</strong><br><br>Cotizar con nosotros es muy fácil, solo tienes que enviar <strong>tu idea, imágenes de referencia o un boceto del producto que deseas materializar, indicando las dimensiones aproximadas y la cantidad. Nuestro equipo revisará tu solicitud para comprender tu narrativa y lo que quieres representar. En breve te contactaremos por WhatsApp para definir los detalles técnicos, confirmar la viabilidad de impresión en 3D y enviarte el valor final para iniciar juntos el proceso de co-creación.</strong>';
          }
        });
    }

    function renderProductPage() {
      const data = readSelectedProduct();
      const { titleEl, excerptEl } = updateProductText(data);
      updateProductImage(data);
      loadPersonalizationContent(data, excerptEl, titleEl);
    }

    function getSelectedProductItem() {
      const fallbackItem = {
        name: document.getElementById('pd-title').textContent,
        price: document.getElementById('pd-price').textContent || '0'
      };

      let item = fallbackItem;

      try {
        const raw = localStorage.getItem('cyberduck:selectedProduct');
        if (raw) {
          item = JSON.parse(raw);
        }
      } catch (error) {
        console.warn('No se pudo leer el producto seleccionado para el carrito:', error);
      }

      if (globalThis.cyberduck && globalThis.cyberduck.normalizeCartItem) {
        item = globalThis.cyberduck.normalizeCartItem(item);
      }

      return item;
    }

    function storeCartItem(item) {
      let cart = [];

      try {
        const cartRaw = localStorage.getItem('cyberduck:cart');
        cart = cartRaw ? JSON.parse(cartRaw) : [];
      } catch (error) {
        console.warn('No se pudo leer el carrito:', error);
      }

      cart.push(item);
      const normalizedCart = globalThis.cyberduck ? globalThis.cyberduck.normalizeCartItems(cart) : cart;
      localStorage.setItem('cyberduck:cart', JSON.stringify(normalizedCart));
      return normalizedCart;
    }

    function refreshCartPreview(cart) {
      if (globalThis.cyberduck && globalThis.cyberduck.renderCart) {
        globalThis.cyberduck.renderCart();
        return;
      }

      const cartCount = document.getElementById('cartCount');
      if (cartCount) cartCount.textContent = cart.length;

      let total = 0;
      cart.forEach(it => {
        const val = globalThis.cyberduck ? globalThis.cyberduck.normalizeCurrencyValue(it.price) || 0 : Number.parseFloat((it.price || '0').toString()) || 0;
        total += val;
      });

      const cartTotal = document.getElementById('cartTotal');
      if (cartTotal) cartTotal.textContent = 'Total: $' + (total ? total.toLocaleString('es-CO') : '0');
    }

    function addSelectedProductToCart() {
      const item = getSelectedProductItem();
      const cart = storeCartItem(item);
      refreshCartPreview(cart);
      alert('Producto añadido al carrito');
    }

    function initializeProductPage() {
      renderProductPage();

      const addBtn = document.getElementById('pd-add');
      if (addBtn) {
        addBtn.addEventListener('click', addSelectedProductToCart);
      }

      const backBtn = document.getElementById('pd-back');
      if (backBtn) {
        backBtn.addEventListener('click', function(e) {
          e.preventDefault();
          globalThis.history.back();
        });
      }
    }

    document.addEventListener('DOMContentLoaded', initializeProductPage);
  </script>
</body>
</html>
